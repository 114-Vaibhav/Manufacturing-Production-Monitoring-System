
<div
  class="w-64 min-h-screen bg-slate-900 border-r border-slate-700">

  <div class="p-6 border-b border-slate-700">

    <h2 class="text-white text-xl font-bold">
      VSG
    </h2>

    <p class="text-slate-400 text-sm">
      Manufacturing System
    </p>

  </div>

  <ul class="mt-4">

    <li
      *ngFor="let item of menuItems"
      class="mx-3 mb-2">

      <a
        href="#"
        class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-cyan-400 transition">

        <span>{{ item.icon }}</span>

        <span>
          {{ item.label }}
        </span>

      </a>

    </li>

  </ul>

</div>
