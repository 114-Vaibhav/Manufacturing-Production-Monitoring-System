<label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700" [ngClass]="{ 'md:col-span-2': fullWidth }">
    {{ label }}
    <input *ngIf="type !== 'textarea' && type !== 'select'" [type]="type" [formControl]="control"
        [placeholder]="placeholder" [class.border-red-500]="isInvalid"
        class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
    <textarea *ngIf="type === 'textarea'" [formControl]="control" [placeholder]="placeholder" [rows]="rows"
        [class.border-red-500]="isInvalid"
        class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"></textarea>
    <select *ngIf="type === 'select'" [formControl]="control" [class.border-red-500]="isInvalid"
        class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
        <option value="" disabled>Select {{ label.toLowerCase() }}</option>
        <option *ngFor="let opt of options" [value]="opt.value">{{ opt.label }}</option>
    </select>
    <span *ngIf="isInvalid" class="text-xs text-red-600">{{ errorMessage }}</span>
</label>
