<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-950/40 p-4">
  <section class="w-full max-w-md rounded-lg bg-white p-5 shadow-xl">
    <h2 class="text-lg font-semibold text-gray-950">{{ title }}</h2>
    <p class="mt-2 text-sm text-gray-600">{{ message }}</p>
    <div class="mt-5 flex justify-end gap-2">
      <button
        type="button"
        (click)="cancelled.emit()"
        class="rounded-md border border-gray-300 px-3 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-50"
      >
        Cancel
      </button>
      <button
        type="button"
        (click)="confirmed.emit()"
        class="rounded-md bg-red-600 px-3 py-2 text-sm font-semibold text-white transition hover:bg-red-700"
      >
        {{ confirmText }}
      </button>
    </div>
  </section>
</div>
