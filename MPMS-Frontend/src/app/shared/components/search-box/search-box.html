<label class="block">
  <span class="sr-only">{{ placeholder }}</span>
  <input
    type="search"
    [ngModel]="value"
    (ngModelChange)="valueChange.emit($event)"
    [placeholder]="placeholder"
    class="w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm text-gray-950 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"
  >
</label>
