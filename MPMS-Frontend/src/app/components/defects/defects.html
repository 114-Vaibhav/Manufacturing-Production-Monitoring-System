<section class="min-h-full bg-gray-50 p-4 sm:p-6">
  <div class="mx-auto flex max-w-7xl flex-col gap-5">
    <app-page-header title="Defects"
      description="Report and manage quality defects from the Defects API."></app-page-header>
    <div *ngIf="errorMessage"
      class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700">{{ errorMessage }}
    </div>
    <div *ngIf="successMessage"
      class="rounded-md border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700">{{
      successMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm">
      <div class="mb-4 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
        <h2 class="text-base font-semibold text-gray-900">{{ editingDefectId === null ? 'Report Defect' : 'Update
          Defect' }}</h2>
        <button type="button" (click)="resetForm()"
          class="rounded-md border border-gray-300 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Clear</button>
      </div>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">Order ID
          <input type="number" formControlName="orderId"
            class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
          <span *ngIf="form.controls.orderId.touched && form.controls.orderId.invalid"
            class="text-xs text-red-600">Order ID must be greater than 0.</span>
        </label>
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">Machine ID
          <input type="number" formControlName="machineId"
            class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
          <span *ngIf="form.controls.machineId.touched && form.controls.machineId.invalid"
            class="text-xs text-red-600">Machine ID must be greater than 0.</span>
        </label>
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">Type
          <select formControlName="type"
            class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
            <option value="" disabled>Select type</option>
            <option *ngFor="let opt of typeOptions" [value]="opt.value">{{ opt.label }}</option>
          </select>
          <span *ngIf="form.controls.type.touched && form.controls.type.invalid" class="text-xs text-red-600">Type is
            required.</span>
        </label>
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">Severity
          <select formControlName="severity"
            class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
            <option value="" disabled>Select severity</option>
            <option *ngFor="let opt of severityOptions" [value]="opt.value">{{ opt.label }}</option>
          </select>
          <span *ngIf="form.controls.severity.touched && form.controls.severity.invalid"
            class="text-xs text-red-600">Severity is required.</span>
        </label>
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700 md:col-span-2">Description
          <textarea rows="3" formControlName="description"
            class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"></textarea>
          <span *ngIf="form.controls.description.touched && form.controls.description.invalid"
            class="text-xs text-red-600">Description must be 5-500 characters.</span>
        </label>
      </div>
      <div class="mt-4 flex justify-end">
        <button type="submit" [disabled]="saving"
          class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-60">{{
          saving ? 'Saving...' : editingDefectId === null ? 'Report' : 'Update' }}</button>
      </div>
    </form>

    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <app-search-box placeholder="Search defects" [(value)]="searchTerm"></app-search-box>
      <app-pagination [pageNumber]="pageNumber" [pageSize]="pageSize" [itemCount]="defects.length" [loading]="loading"
        (previousPage)="previousPage()" (nextPage)="nextPage()"></app-pagination>
    </div>
    <app-loading-spinner *ngIf="loading" label="Loading defects..."></app-loading-spinner>
    <app-empty-state *ngIf="!loading && filteredDefects.length === 0" message="No defects found."></app-empty-state>
    <app-data-table *ngIf="!loading && filteredDefects.length > 0" [columns]="columns" [rows]="filteredDefects"
      (edit)="editDefect($event)" (delete)="requestDelete($event)"></app-data-table>
  </div>
  <app-confirm-dialog [open]="defectToDelete !== null" title="Delete defect" message="Delete this defect?"
    confirmText="Delete" (confirmed)="confirmDelete()" (cancelled)="defectToDelete = null"></app-confirm-dialog>
</section>
