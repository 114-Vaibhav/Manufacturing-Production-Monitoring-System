<div class="flex min-h-screen items-center justify-center bg-gray-100 p-4">
  <div class="w-full max-w-sm rounded-2xl bg-white p-8 shadow-xl space-y-6">
    <div class="text-center">
      <img 
        src="/logo1.png" 
        alt="VSG Logo" 
        class="mx-auto h-40 w-auto object-contain"
      >

      <h2 class="mt-2 text-2xl font-bold tracking-tight text-gray-900">Welcome Back</h2>
      <p class="mt-1 text-sm text-gray-500">Please sign in to your account</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1">Username</label>
        <input 
          type="text" 
          placeholder="Enter username" 
          [(ngModel)]="loginModel.UserName" 
          class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-950 placeholder-gray-400 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"
        >
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1">Password</label>
        <div class="relative">
          <input 
            #passwordInput
            type="password" 
            placeholder="••••••••" 
            [(ngModel)]="loginModel.Password"
            class="w-full rounded-lg border border-gray-300 pl-4 pr-11 py-2.5 text-sm text-gray-950 placeholder-gray-400 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"
          >
          <button 
            type="button"
            (click)="passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password'"
            class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-gray-400 hover:text-gray-600 focus:outline-none"
          >
            <svg *ngIf="passwordInput.type === 'password'" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <svg *ngIf="passwordInput.type === 'text'" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.895 7.895L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
          </button>
        </div>
      </div>
      
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-600 mb-1">Select Role</label>
        <div class="relative">
          <select 
            [(ngModel)]="loginModel.Role"
            name="userRole" 
            class="w-full appearance-none rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm text-gray-950 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"
          >
            <option [ngValue]="-1" disabled>Select your role...</option>
            
            <option *ngFor="let role of roles" [ngValue]="role.value">
              {{ role.name }}
            </option>
          </select> 
          
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </div>
        </div>
      </div>

      <button 
        (click)="login()"
        class="mt-2 w-full rounded-lg bg-indigo-600 py-2.5 text-sm font-semibold text-white shadow-md transition hover:bg-indigo-700 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
      >
        Sign In
      </button>
    </div>
  </div>
</div>
