<section class="min-h-full bg-gray-50 p-4 sm:p-6">
  <div class="mx-auto flex max-w-7xl flex-col gap-5">
    <app-page-header title="Machines" description="Manage machine master data from the Machines API."></app-page-header>

    <div *ngIf="errorMessage"
      class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700">{{ errorMessage }}
    </div>
    <div *ngIf="successMessage"
      class="rounded-md border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700">{{
      successMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm">
      <div class="mb-4 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
        <h2 class="text-base font-semibold text-gray-900">{{ editingMachineId === null ? 'Create Machine' : 'Update
          Machine' }}</h2>
        <button type="button" (click)="resetForm()"
          class="rounded-md border border-gray-300 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Clear</button>
      </div>

      <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
          Machine Name
          <input formControlName="machineName"
            class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
          <span *ngIf="form.controls.machineName.touched && form.controls.machineName.invalid"
            class="text-xs text-red-600">Machine name is required and must be 2-100 characters.</span>
        </label>
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
          Machine Code
          <input formControlName="machineCode"
            class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
          <span *ngIf="form.controls.machineCode.touched && form.controls.machineCode.invalid"
            class="text-xs text-red-600">Use 2-50 letters, numbers, or hyphens.</span>
        </label>
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
          Location ID
          <input type="number" formControlName="locationId"
            class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
          <span *ngIf="form.controls.locationId.touched && form.controls.locationId.invalid"
            class="text-xs text-red-600">Location ID must be greater than 0.</span>
        </label>
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
          Status
          <select formControlName="status"
            class="rounded-md border border-gray-300 bg-white px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
            <option *ngFor="let option of statusOptions" [ngValue]="option.value">{{ option.label }}</option>
          </select>
        </label>
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
          Last Maintenance Date
          <input type="date" formControlName="lastMaintenanceDate"
            class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
        </label>
      </div>

      <div class="mt-4 flex justify-end">
        <button type="submit" [disabled]="saving"
          class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-60">
          {{ saving ? 'Saving...' : editingMachineId === null ? 'Create' : 'Update' }}
        </button>
      </div>
    </form>

    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <app-search-box placeholder="Search machines" [(value)]="searchTerm"></app-search-box>
      <app-pagination [pageNumber]="pageNumber" [pageSize]="pageSize" [itemCount]="machines.length" [loading]="loading"
        (previousPage)="previousPage()" (nextPage)="nextPage()"></app-pagination>
    </div>

    <app-loading-spinner *ngIf="loading" label="Loading machines..."></app-loading-spinner>
    <app-empty-state *ngIf="!loading && filteredMachines.length === 0" message="No machines found."></app-empty-state>
    <app-data-table *ngIf="!loading && filteredMachines.length > 0" [columns]="columns" [rows]="filteredMachines"
      (edit)="editMachine($event)" (delete)="requestDelete($event)"></app-data-table>
  </div>

  <app-confirm-dialog [open]="machineToDelete !== null" title="Delete machine"
    [message]="'Delete ' + (machineToDelete?.machineName ?? 'this machine') + '?'" confirmText="Delete"
    (confirmed)="confirmDelete()" (cancelled)="machineToDelete = null"></app-confirm-dialog>
</section>
