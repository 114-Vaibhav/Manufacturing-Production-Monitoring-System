<section class="min-h-full bg-gray-50 p-4 sm:p-6">
  <div class="mx-auto flex max-w-7xl flex-col gap-5">
    <app-page-header title="Machine Readings" description="View and update sensor readings from the MachineReadings API."></app-page-header>

    <div *ngIf="errorMessage" class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="rounded-md border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700">{{ successMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm">
      <div class="mb-4 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
        <h2 class="text-base font-semibold text-gray-900">Update Machine Reading</h2>
        <button type="button" (click)="resetForm()" class="rounded-md border border-gray-300 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Clear</button>
      </div>
      <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">Machine ID
          <input type="number" formControlName="machineId" class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
          <span *ngIf="form.controls.machineId.touched && form.controls.machineId.invalid" class="text-xs text-red-600">Machine ID must be greater than 0.</span>
        </label>
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">Temperature
          <input type="number" formControlName="temperature" class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
          <span *ngIf="form.controls.temperature.touched && form.controls.temperature.invalid" class="text-xs text-red-600">Temperature must be between -50 and 250.</span>
        </label>
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">Vibration
          <input type="number" formControlName="vibration" class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
          <span *ngIf="form.controls.vibration.touched && form.controls.vibration.invalid" class="text-xs text-red-600">Vibration cannot be negative.</span>
        </label>
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">Power Consumption
          <input type="number" formControlName="powerConsumption" class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
          <span *ngIf="form.controls.powerConsumption.touched && form.controls.powerConsumption.invalid" class="text-xs text-red-600">Power consumption cannot be negative.</span>
        </label>
      </div>
      <div class="mt-4 flex justify-end">
        <button type="submit" [disabled]="saving" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-60">
          {{ saving ? 'Saving...' : 'Update' }}
        </button>
      </div>
    </form>

    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <app-search-box placeholder="Search readings" [(value)]="searchTerm"></app-search-box>
      <app-pagination [pageNumber]="pageNumber" [pageSize]="pageSize" [itemCount]="readings.length" [loading]="loading" (previousPage)="previousPage()" (nextPage)="nextPage()"></app-pagination>
    </div>

    <app-loading-spinner *ngIf="loading" label="Loading machine readings..."></app-loading-spinner>
    <app-empty-state *ngIf="!loading && filteredReadings.length === 0" message="No machine readings found."></app-empty-state>
    <app-data-table *ngIf="!loading && filteredReadings.length > 0" [columns]="columns" [rows]="filteredReadings" (edit)="editReading($event)" (delete)="requestDelete($event)"></app-data-table>
  </div>

  <app-confirm-dialog [open]="readingToDelete !== null" title="Delete reading" message="Delete this machine reading?" confirmText="Delete" (confirmed)="confirmDelete()" (cancelled)="readingToDelete = null"></app-confirm-dialog>
</section>
