<section class="min-h-full bg-gray-50 p-4 sm:p-6">
  <div class="mx-auto flex max-w-7xl flex-col gap-5">
    <app-page-header title="Products" description="Manage product catalog records from the Products API."></app-page-header>

    <div *ngIf="errorMessage" class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700">
      {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="rounded-md border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700">
      {{ successMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm">
      <div class="mb-4 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
        <h2 class="text-base font-semibold text-gray-900">{{ editingProductId === null ? 'Create Product' : 'Update Product' }}</h2>
        <button type="button" (click)="resetForm()" class="rounded-md border border-gray-300 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Clear</button>
      </div>

      <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
          Product Name
          <input formControlName="productName" class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
          <span *ngIf="form.controls.productName.touched && form.controls.productName.invalid" class="text-xs text-red-600">Product name is required and must be 2-100 characters.</span>
        </label>

        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
          Product Code
          <input formControlName="productCode" class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
          <span *ngIf="form.controls.productCode.touched && form.controls.productCode.invalid" class="text-xs text-red-600">Use 2-50 letters, numbers, or hyphens.</span>
        </label>

        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
          Unit Price
          <input type="number" formControlName="unitPrice" class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
          <span *ngIf="form.controls.unitPrice.touched && form.controls.unitPrice.invalid" class="text-xs text-red-600">Unit price must be greater than 0.</span>
        </label>

        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
          Status
          <select formControlName="status" class="rounded-md border border-gray-300 bg-white px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
            <option *ngFor="let option of statusOptions" [value]="option.value">{{ option.label }}</option>
          </select>
        </label>

        <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700 md:col-span-2">
          Description
          <textarea rows="3" formControlName="description" class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"></textarea>
          <span *ngIf="form.controls.description.touched && form.controls.description.invalid" class="text-xs text-red-600">Description must be 5-500 characters.</span>
        </label>
      </div>

      <div class="mt-4 flex justify-end">
        <button type="submit" [disabled]="saving" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-60">
          {{ saving ? 'Saving...' : editingProductId === null ? 'Create' : 'Update' }}
        </button>
      </div>
    </form>

    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <app-search-box placeholder="Search products" [(value)]="searchTerm"></app-search-box>
      <app-pagination [pageNumber]="pageNumber" [pageSize]="pageSize" [itemCount]="products.length" [loading]="loading" (previousPage)="previousPage()" (nextPage)="nextPage()"></app-pagination>
    </div>

    <app-loading-spinner *ngIf="loading" label="Loading products..."></app-loading-spinner>
    <app-empty-state *ngIf="!loading && filteredProducts.length === 0" message="No products found."></app-empty-state>
    <app-data-table *ngIf="!loading && filteredProducts.length > 0" [columns]="columns" [rows]="filteredProducts" (edit)="editProduct($event)" (delete)="requestDelete($event)"></app-data-table>
  </div>

  <app-confirm-dialog
    [open]="productToDelete !== null"
    title="Delete product"
    [message]="'Delete ' + (productToDelete?.productName ?? 'this product') + '?'"
    confirmText="Delete"
    (confirmed)="confirmDelete()"
    (cancelled)="productToDelete = null"
  ></app-confirm-dialog>
</section>
