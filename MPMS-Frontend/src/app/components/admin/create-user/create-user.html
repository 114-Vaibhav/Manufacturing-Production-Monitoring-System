<section class="min-h-full bg-gray-50 p-4 sm:p-6">
    <div class="mx-auto flex max-w-4xl flex-col gap-5">
        <app-page-header title="Create User"
            description="Add a new user to the system with appropriate role and permissions."></app-page-header>

        <div *ngIf="errorMessage"
            class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700">
            {{ errorMessage }}
        </div>
        <div *ngIf="successMessage"
            class="rounded-md border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700">
            {{ successMessage }}
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()" class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
            <div class="grid gap-6 md:grid-cols-2">
                <!-- Username -->
                <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
                    Username
                    <input type="text" placeholder="username123" formControlName="username"
                        [class.border-red-500]="form.controls.username.invalid && form.controls.username.touched"
                        class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
                    <span *ngIf="form.controls.username.invalid && form.controls.username.touched"
                        class="text-xs text-red-600">
                        Username must be 4-50 characters, alphanumeric with - and _ allowed.
                    </span>
                </label>

                <!-- Full Name -->
                <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
                    Full Name
                    <input type="text" placeholder="John Doe" formControlName="fullName"
                        [class.border-red-500]="form.controls.fullName.invalid && form.controls.fullName.touched"
                        class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
                    <span *ngIf="form.controls.fullName.invalid && form.controls.fullName.touched"
                        class="text-xs text-red-600">
                        Full name must be 2-100 characters.
                    </span>
                </label>

                <!-- Email -->
                <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
                    Email
                    <input type="email" placeholder="john@example.com" formControlName="email"
                        [class.border-red-500]="form.controls.email.invalid && form.controls.email.touched"
                        class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
                    <span *ngIf="form.controls.email.invalid && form.controls.email.touched"
                        class="text-xs text-red-600">
                        Please enter a valid email address.
                    </span>
                </label>

                <!-- Role -->
                <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
                    Role
                    <select formControlName="role"
                        [class.border-red-500]="form.controls.role.invalid && form.controls.role.touched"
                        class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
                        <option *ngFor="let opt of roleOptions" [value]="opt.value">{{ opt.label }}</option>
                    </select>
                    <span *ngIf="form.controls.role.invalid && form.controls.role.touched" class="text-xs text-red-600">
                        Role is required.
                    </span>
                </label>

                <!-- Status -->
                <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
                    Status
                    <select formControlName="status"
                        [class.border-red-500]="form.controls.status.invalid && form.controls.status.touched"
                        class="rounded-md border border-gray-300 px-3 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
                        <option *ngFor="let opt of statusOptions" [value]="opt.value">{{ opt.label }}</option>
                    </select>
                    <span *ngIf="form.controls.status.invalid && form.controls.status.touched"
                        class="text-xs text-red-600">
                        Status is required.
                    </span>
                </label>

                <!-- Password -->
                <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
                    Password
                    <div class="relative">
                        <input [type]="passwordVisible ? 'text' : 'password'" placeholder="••••••••"
                            formControlName="password"
                            [class.border-red-500]="form.controls.password.invalid && form.controls.password.touched"
                            class="w-full rounded-md border border-gray-300 pl-3 pr-10 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
                        <button type="button" (click)="togglePasswordVisibility()"
                            class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600"
                            tabindex="-1">
                            <svg *ngIf="!passwordVisible" class="h-5 w-5" fill="none" stroke="currentColor"
                                stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg *ngIf="passwordVisible" class="h-5 w-5" fill="none" stroke="currentColor"
                                stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.895 7.895L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                            </svg>
                        </button>
                    </div>
                    <span *ngIf="form.controls.password.invalid && form.controls.password.touched"
                        class="text-xs text-red-600">
                        Password must be at least 8 characters.
                    </span>
                </label>

                <!-- Password Confirm -->
                <label class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
                    Confirm Password
                    <div class="relative">
                        <input [type]="passwordConfirmVisible ? 'text' : 'password'" placeholder="••••••••"
                            formControlName="passwordConfirm"
                            [class.border-red-500]="(form.controls.passwordConfirm.invalid || passwordMatchError) && form.controls.passwordConfirm.touched"
                            class="w-full rounded-md border border-gray-300 pl-3 pr-10 py-2 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100" />
                        <button type="button" (click)="togglePasswordConfirmVisibility()"
                            class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600"
                            tabindex="-1">
                            <svg *ngIf="!passwordConfirmVisible" class="h-5 w-5" fill="none" stroke="currentColor"
                                stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg *ngIf="passwordConfirmVisible" class="h-5 w-5" fill="none" stroke="currentColor"
                                stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.895 7.895L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                            </svg>
                        </button>
                    </div>
                    <span
                        *ngIf="(form.controls.passwordConfirm.invalid || passwordMatchError) && form.controls.passwordConfirm.touched"
                        class="text-xs text-red-600">
                        {{ passwordMatchError ? 'Passwords do not match.' : 'This field is required.' }}
                    </span>
                </label>
            </div>

            <div class="mt-6 flex justify-between">
                <button type="button" (click)="resetForm()"
                    class="rounded-md border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">
                    Clear
                </button>
                <button type="submit" [disabled]="saving"
                    class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-60">
                    {{ saving ? 'Creating...' : 'Create User' }}
                </button>
            </div>
        </form>
    </div>
</section>
