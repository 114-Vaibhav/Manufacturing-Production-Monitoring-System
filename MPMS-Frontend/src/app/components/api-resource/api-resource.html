<section class="mx-auto flex w-full max-w-7xl flex-col gap-5">
  <div class="flex flex-col gap-3 border-b border-gray-200 pb-4 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-gray-950">{{ config.title }}</h1>
      <p class="mt-1 text-sm text-gray-600">{{ config.description }}</p>
    </div>

    <div class="flex items-center gap-2 text-sm">
      <button
        type="button"
        (click)="previousPage()"
        [disabled]="pageNumber === 1 || loading"
        class="rounded-md border border-gray-300 bg-white px-3 py-2 font-medium text-gray-700 transition hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50"
      >
        Previous
      </button>
      <span class="min-w-12 text-center font-semibold text-gray-700">Page {{ pageNumber }}</span>
      <button
        type="button"
        (click)="nextPage()"
        [disabled]="loading || records.length < pageSize"
        class="rounded-md border border-gray-300 bg-white px-3 py-2 font-medium text-gray-700 transition hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50"
      >
        Next
      </button>
    </div>
  </div>

  <div *ngIf="errorMessage" class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700">
    {{ errorMessage }}
  </div>

  <div *ngIf="successMessage" class="rounded-md border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700">
    {{ successMessage }}
  </div>

  <form *ngIf="config.formFields.length" (ngSubmit)="save()" class="rounded-lg border border-gray-200 bg-white p-4 shadow-sm">
    <div class="mb-4 flex items-center justify-between gap-3">
      <h2 class="text-base font-semibold text-gray-900">
        {{ editingId === null ? 'Create' : 'Update' }} {{ config.title }}
      </h2>
      <button
        type="button"
        (click)="resetForm()"
        class="rounded-md border border-gray-300 px-3 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-50"
      >
        Clear
      </button>
    </div>

    <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
      <label *ngFor="let field of config.formFields" class="flex flex-col gap-1.5 text-sm font-medium text-gray-700">
        {{ field.label }}

        <textarea
          *ngIf="field.type === 'textarea'"
          [(ngModel)]="form[field.key]"
          [name]="field.key"
          [required]="!!field.required"
          rows="3"
          class="min-h-24 rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-950 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"
        ></textarea>

        <select
          *ngIf="field.type === 'select'"
          [(ngModel)]="form[field.key]"
          [name]="field.key"
          [required]="!!field.required"
          class="rounded-md border border-gray-300 bg-white px-3 py-2 text-sm text-gray-950 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"
        >
          <option *ngFor="let option of field.options" [ngValue]="option.value">{{ option.label }}</option>
        </select>

        <input
          *ngIf="field.type !== 'textarea' && field.type !== 'select'"
          [(ngModel)]="form[field.key]"
          [name]="field.key"
          [type]="field.type"
          [required]="!!field.required"
          class="rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-950 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"
        >
      </label>
    </div>

    <div class="mt-4 flex justify-end">
      <button
        type="submit"
        [disabled]="saving"
        class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ saving ? 'Saving...' : editingId === null ? 'Create' : 'Update' }}
      </button>
    </div>
  </form>

  <div class="overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200 text-sm">
        <thead class="bg-gray-50">
          <tr>
            <th *ngFor="let column of config.columns" class="px-4 py-3 text-left font-semibold text-gray-700">
              {{ column.label }}
            </th>
            <th *ngIf="canEdit || canDelete" class="px-4 py-3 text-right font-semibold text-gray-700">Actions</th>
          </tr>
        </thead>

        <tbody class="divide-y divide-gray-100">
          <tr *ngIf="loading">
            <td [attr.colspan]="config.columns.length + 1" class="px-4 py-8 text-center text-gray-500">
              Loading {{ config.title.toLowerCase() }}...
            </td>
          </tr>

          <tr *ngIf="!loading && records.length === 0">
            <td [attr.colspan]="config.columns.length + 1" class="px-4 py-8 text-center text-gray-500">
              No records found.
            </td>
          </tr>

          <tr *ngFor="let record of records; trackBy: trackById" class="hover:bg-gray-50">
            <td *ngFor="let column of config.columns" class="max-w-72 px-4 py-3 text-gray-800">
              <span class="line-clamp-2">{{ displayValue(record, column) }}</span>
            </td>
            <td *ngIf="canEdit || canDelete" class="px-4 py-3">
              <div class="flex justify-end gap-2">
                <button
                  *ngIf="canEdit"
                  type="button"
                  (click)="edit(record)"
                  class="rounded-md border border-indigo-200 px-3 py-1.5 text-sm font-medium text-indigo-700 transition hover:bg-indigo-50"
                >
                  Edit
                </button>
                <button
                  *ngIf="canDelete"
                  type="button"
                  (click)="delete(record)"
                  class="rounded-md border border-red-200 px-3 py-1.5 text-sm font-medium text-red-700 transition hover:bg-red-50"
                >
                  Delete
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
